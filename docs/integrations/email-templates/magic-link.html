<!-- Supabase Auth → Email Templates → Magic Link.
     MUST keep both {{ .ConfirmationURL }} (the tap-through link) and
     {{ .Token }} (the 6-digit code fallback the app accepts). -->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#F7F5F0;padding:32px 0;">
  <tr>
    <td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border-radius:18px;border:1px solid #E5E2D9;padding:48px 40px;font-family:Georgia,serif;color:#04072F;">
        <tr>
          <td align="center">
            <div style="width:72px;height:72px;border-radius:50%;border:2.5px solid #04072F;line-height:72px;font-size:26px;letter-spacing:1px;">RG</div>
            <p style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#8B8EA6;margin:24px 0 4px;">REGROWTH&reg;</p>
            <h1 style="font-weight:300;font-size:28px;margin:8px 0 16px;">Welcome back</h1>
            <p style="font-size:16px;line-height:24px;color:#4A4E6E;margin:0 0 28px;">
              Tap below from your phone and we'll sign you straight in —
              no password, ever.
            </p>
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block;background:#D17F5D;color:#FFFFFF;text-decoration:none;border-radius:999px;padding:14px 36px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;">
              Sign me in
            </a>
            <p style="font-size:14px;color:#8B8EA6;margin:32px 0 8px;">
              Link not working? Enter this code in the app instead:
            </p>
            <p style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:30px;letter-spacing:10px;margin:0;">{{ .Token }}</p>
            <p style="font-size:12px;color:#8B8EA6;margin:36px 0 0;">
              This link expires in an hour. If you didn't request it, you can
              safely ignore this email.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
